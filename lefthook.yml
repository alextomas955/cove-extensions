# lefthook — one pre-commit gate spanning the mixed C# + TypeScript repo (plan §4.3).
#
# Why lefthook (not husky+lint-staged): a single language-agnostic YAML runs the .NET and Node
# checks together. ESLint is one repo-root config (eslint.config.mjs) covering every extension's UI
# and all .mjs/.cjs scripts; the same type-aware gate runs here and in CI (lint.yml's js-lint job),
# since the vendored @cove/extension-sdk is committed and installs offline in both.
#
# Keep it lightweight: format/lint only STAGED files; no full build or test run on commit.

pre-commit:
  parallel: true
  commands:
    # --- TypeScript/JS: prettier + per-UI class guard, then one repo-root ESLint ---
    # Per extension UI bundle: Prettier formatting + the host-JIT-Tailwind/XSS class guard (`root:`
    # makes `npx`/node resolve that package's local binaries). Add a matching pair when a new
    # extension ships a UI. ESLint is deliberately NOT here — it is the single repo-root js-lint gate
    # below, covering every extension's UI and all .mjs/.cjs scripts from one config.
    frontend-format-renamer:
      root: extensions/Renamer/src/Renamer.Ui/
      glob: "*.{ts,tsx,json,jsonc,css,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    check-classes-renamer:
      root: extensions/Renamer/src/Renamer.Ui/
      glob: "*.tsx"
      run: node scripts/check-classes.cjs
    frontend-format-whisparr:
      root: extensions/WhisparrSync/src/WhisparrSync.Ui/
      glob: "*.{ts,tsx,json,jsonc,css,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    check-classes-whisparr:
      root: extensions/WhisparrSync/src/WhisparrSync.Ui/
      glob: "*.tsx"
      run: node scripts/check-classes.cjs

    # Single monorepo-wide ESLint (root eslint.config.mjs): every extension's TS/React UI + all
    # first-party .mjs/.cjs helper/build/test scripts. Type-aware, so it resolves each UI's installed
    # deps on the dev box.
    js-lint:
      glob: "*.{ts,tsx,mjs,cjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    # --- C#: format-verify changed projects (cheap; no full build) ---
    csharp-format:
      glob: "*.cs"
      run: dotnet format CoveExtensions.slnx --verify-no-changes --severity warn --include {staged_files}

    # Local-only: warns when the committed vendor/cove-extension-sdk-*.tgz drifts from the
    # sibling ../cove checkout's frontend SDK version. Cannot run in CI (no ../cove there) — it
    # no-ops there and on any clean clone lacking the sibling. Unconditional (not glob-scoped):
    # the script itself no-ops fast when the sibling is absent, which is cheaper and safer than
    # a multi-path glob pattern here. Runs with --warn so it never blocks a commit (informational
    # only); drop --warn to make it a hard fail once the maintainer wants drift to block commits.
    sdk-drift-check:
      run: node extensions/Renamer/scripts/check-sdk-drift.mjs --warn

    # Local + CI advisory: warns when an extension's public-surface source (settings/options/SDK/
    # manifest/UI-settings) changed but that extension's docs did not (docs/, README, CHANGELOG, or
    # the website/docs page). Heuristic, so it WARNS only — a source change may legitimately need no
    # docs update; the PR checklist is where intent is confirmed. Catalog-driven (scales to N
    # extensions). Drop --warn to make it a hard fail once the maintainer wants drift to block.
    docs-drift-check:
      run: node scripts/check-docs-drift.mjs --warn {staged_files}

    # Flags added comments in the staged diff that read as narrative (change-story, consumer-behavior,
    # author voice) instead of a non-obvious why (the CLAUDE.md rule). Heuristic, so it WARNS only; drop
    # --warn to make narrative comments a hard fail.
    comment-hygiene:
      run: node scripts/check-comment-hygiene.mjs --warn

version: 2
updates:
  # All C# NuGet versions live in the single root Directory.Packages.props (Central Package
  # Management), so ONE root-scoped block watches the whole solution — a new extension following the
  # template shape is covered with no dependabot edit (additive-by-config, mirroring the catalog-driven
  # CI matrix).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Host-provided / host-ABI-critical packages are hand-bumped in lockstep with the deployed Cove
    # host, NEVER by Dependabot: Cove.Sdk/Cove.Plugins/Cove.Core ARE the host SDK (version pinned to
    # the $(CoveSdkVersion) property and coupled to each extension's minCoveVersion), and EF Core is
    # referenced Private=false so its version MUST equal the host's runtime (a mismatch is an
    # AssemblyLoadContext type-identity break). Dependabot does not respect the $(CoveSdkVersion)
    # property indirection — it rewrote the property + injected a VersionOverride — so it opened
    # exactly these wrong PRs (#62/#82/#83) until this explicit ignore.
    ignore:
      - dependency-name: "Cove.Sdk"
      - dependency-name: "Cove.Plugins"
      - dependency-name: "Cove.Core"
      - dependency-name: "Microsoft.EntityFrameworkCore*"
    groups:
      test-analysis:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "Xunit.SkippableFact"

  # Every extension's frontend panel (glob, GA June 2024). @cove/extension-sdk is a file:vendor/...
  # dependency (a committed tarball, not a registry package), so Dependabot does not — and cannot —
  # bump it; it is updated by re-vendoring. The registry deps are updated normally; a new extension's
  # *.Ui package is covered automatically. This glob does NOT overlap the root "/" npm-workspace block
  # below: the UI packages are standalone (own lockfile, vendored SDK), not workspace members.
  - package-ecosystem: "npm"
    directories:
      - "/extensions/*/src/*.Ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
          - "@tanstack/*"

  # JS workspaces root — the single root package-lock.json owns the shared E2E harness (tests/e2e:
  # Testcontainers, Playwright + transitive deps) and every extension's e2e workspace. Dependabot's
  # npm updater points at the directory holding the lockfile (the root), which covers all npm
  # workspaces. Used by every extension's e2e suite (see tests/e2e/README.md), not Renamer-specific.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Docs site (Docusaurus) — its own package-lock.json, separate from the JS workspaces root.
  # The co-versioned @docusaurus/* (+ @mdx-js/*) packages are grouped into one PR per release
  # instead of ~8 separate ones. cooldown defers a version bump until the release has had time to
  # be vetted (Docusaurus's own recommended supply-chain measure); security updates ignore
  # cooldown and still open immediately.
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@mdx-js/*"

  # Workflow action versions (checkout, setup-dotnet, setup-node, action-gh-release, codeql-action).
  # Root-scoped regardless of how many extensions exist in this monorepo.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

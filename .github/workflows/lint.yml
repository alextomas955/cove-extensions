# Style, analyzer, docs-lint, and Windows build/unit-test signal — independent checks with no
# `needs:` link to build.yml's validate/build/e2e/release chain, split out so they (a) run on
# direct pushes to main (build.yml only triggers on pull_request + tag push, matching codeql.yml's
# push+PR+schedule trigger here instead), (b) get their own minimal permissions rather than
# inheriting build.yml's release-scoped `contents: write`, and (c) can be re-run independently of
# the release pipeline (GitHub's re-run-failed-jobs action is scoped per workflow run).

name: Lint and Windows Signal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'

permissions:
  contents: read

jobs:
  # ---- C# style + analyzer gate (monorepo-wide, run once against the shared .slnx). This job
  # assumes every extension's projects are added to the root CoveExtensions.slnx as a process convention
  # (RESEARCH.md's Open Decision #3) — a future extension not added to the .slnx would silently
  # skip this gate. ----
  csharp-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # Formatting/style check — reads root .editorconfig.
      - name: dotnet format (verify)
        run: dotnet format CoveExtensions.slnx --verify-no-changes --severity warn
      # Analyzer gate: a Release build with TreatWarningsAsErrors=true (root Directory.Build.props)
      # fails on any CA/IDE warning.
      - name: Build with analyzers (warnings = errors)
        run: dotnet build CoveExtensions.slnx -c Release -p:UseLocalCoveSource=false

  # ---- Windows build + unit-test signal (monorepo-wide). The whole-slnx Build step below compiles
  # every solution member; the unit-test step then runs each catalog entry's testProjectPath, read
  # from extensions/catalog.json, so adding an extension is a catalog edit. Scoped to .NET build/test only, NOT the full
  # containerized E2E suite: GitHub-hosted windows-latest runners' Docker daemon is fixed to Windows
  # containers mode, with no supported way to switch to Linux containers (would need nested
  # virtualization, which the standard hosted fleet does not enable) — so Testcontainers'
  # DockerComposeEnvironment, which starts Linux-only images (the Cove app image + Postgres), cannot
  # run there at all, on any hosted Windows runner, not just as a config issue. This job instead
  # verifies the actual, achievable Windows signal: the solution builds and its unit tier
  # (the pure-core tests that don't need a live Cove checkout — see Renamer.Tests.csproj's
  # cove-absent Compile-Remove group) passes on Windows. A full Windows-hosted E2E run would need a
  # self-hosted Windows runner with Docker Desktop configured for Linux containers, out of scope here. ----
  windows-build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Build
        run: dotnet build CoveExtensions.slnx -c Release -p:UseLocalCoveSource=false
      # The whole-slnx Build above already compiled every test project, so --no-build still holds.
      - name: Test (unit tier)
        shell: bash
        run: |
          mapfile -t tests < <(node -e '
            const fs = require("fs");
            const catalog = JSON.parse(fs.readFileSync("extensions/catalog.json", "utf8"));
            for (const entry of catalog.extensions) {
              if (entry.manifestOnly === true) continue;
              if (entry.testProjectPath) console.log(entry.testProjectPath);
            }
          ')
          for test in "${tests[@]}"; do
            echo "::group::dotnet test $test"
            dotnet test "$test" -c Release --no-build
            echo "::endgroup::"
          done

  # ---- Markdown docs (repo-wide). Scoped to README.md only — no CHANGELOG.md/docs/**/*.md exist
  # yet at the monorepo root; Phase 13 (DOC-04) will expand both this glob and the root docs. ----
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: 'README.md'

  # ---- Monorepo-wide ESLint (single root config at eslint.config.mjs): every extension's TS/React
  # UI bundle plus all first-party .mjs/.cjs helper/build/test scripts. The type-aware UI rules need
  # each extension's UI deps installed to build the TypeScript program, so this installs the root
  # lint tooling and each catalog `uiPath` before running `eslint .` once from the repo root. There
  # is no per-extension ESLint config — adding an extension needs no change here beyond its catalog
  # entry. ----
  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24.11.0'
      - name: Install root lint tooling
        run: npm install --no-workspaces
      - name: Install each extension's UI deps (type-aware program inputs)
        shell: bash
        run: |
          mapfile -t uiPaths < <(node -e '
            const fs = require("fs");
            const catalog = JSON.parse(fs.readFileSync("extensions/catalog.json", "utf8"));
            for (const entry of catalog.extensions) {
              if (entry.uiPath) console.log(entry.uiPath);
            }
          ')
          for ui in "${uiPaths[@]}"; do
            echo "::group::npm install $ui"
            (cd "$ui" && npm install)
            echo "::endgroup::"
          done
      - name: ESLint (whole monorepo)
        run: npm run lint

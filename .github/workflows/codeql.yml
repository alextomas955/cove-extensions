# CodeQL security analysis.
#
# C# is built on a bare runner with no Cove monorepo, so the build leg uses the same NuGet path the
# main build uses (UseLocalCoveSource=false): Cove.Sdk (and its transitive Cove.Plugins/Cove.Core)
# restore from nuget.org. The local-source build property is deliberately NOT used here — it needs
# a Cove checkout the runner does not have.
#
# The C# leg builds every catalog extension's project (skipping manifestOnly entries), reading the
# project paths from extensions/catalog.json, so CodeQL's manual build traces each extension's
# compilation. Adding an extension is a catalog edit — no change here.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so analysis runs even when no new commits land.
    - cron: '23 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # NuGet build path — works on a bare runner with no Cove checkout. Iterates the catalog's
      # projectPaths so every extension's compilation is traced.
      - name: Build C#
        if: matrix.language == 'csharp'
        shell: bash
        run: |
          mapfile -t projects < <(node -e '
            const fs = require("fs");
            const catalog = JSON.parse(fs.readFileSync("extensions/catalog.json", "utf8"));
            for (const entry of catalog.extensions) {
              if (entry.manifestOnly === true) continue;
              if (entry.projectPath) console.log(entry.projectPath);
            }
          ')
          for project in "${projects[@]}"; do
            echo "::group::dotnet build $project"
            dotnet build "$project" -c Release -p:UseLocalCoveSource=false
            echo "::endgroup::"
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

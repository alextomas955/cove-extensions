# Build, validate, and (on <extension-slug>/v* tags) package + release extensions in this monorepo.
#
# Adapted from yourcove/multi-extension-repo-template's build.yml (forked 2026-07-01) to target
# Renamer's real src/ subtree layout via extensions/catalog.json's additive path fields
# (projectPath/manifestPath/uiPath/versionSourcePath — see catalog.json +
# scripts/validate-extension-repo.mjs) instead of the template's flat {path}/{name}.csproj
# convention. Folds in the old single-extension `rename` repo's strip-verify / stale-bundle /
# version-parity / csharp-format / markdown-lint hardening as matrix steps (per-extension) or
# root-level jobs (repo-wide) so future extensions inherit them automatically.
#
# The validate job computes the build matrix from catalog.json (all entries for a PR build; only
# the tagged extension for a tag push) and — on a tag push — confirms the tag matches exactly one
# catalog entry's tagPrefix and carries a valid semver suffix. No PR trigger path filtering is
# used anywhere: every catalog entry is built on every PR (CI-04).

name: Build and Release Extensions

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - '*/v*'

env:
  DOTNET_VERSION: '10.0.x'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24.11.0'

      - name: Validate extension catalog
        run: node scripts/validate-extension-repo.mjs

      - name: Test validator error paths
        run: node --test scripts/validate-extension-repo.test.mjs

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const catalog = JSON.parse(fs.readFileSync("extensions/catalog.json", "utf8"));
            const tag = process.env.GITHUB_REF.replace("refs/tags/", "");
            const matches = catalog.extensions.filter((e) => tag.startsWith(e.tagPrefix));
            if (matches.length !== 1) {
              console.error("Tag " + tag + " must match exactly one catalog tagPrefix, matched " + matches.length);
              process.exit(1);
            }
            const versionTag = tag.slice(matches[0].tagPrefix.length);
            const semver = /^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;
            if (!semver.test(versionTag)) {
              console.error("Tag version suffix " + versionTag + " is not valid semver (expected v<major>.<minor>.<patch>)");
              process.exit(1);
            }
            console.log("Tag " + tag + " matches catalog entry " + matches[0].id + " with version " + versionTag.slice(1));
          '
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Compute build matrix
        id: matrix
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const catalog = JSON.parse(fs.readFileSync("extensions/catalog.json", "utf8"));
            const ref = process.env.GITHUB_REF;
            let extensions = catalog.extensions;
            if (ref.startsWith("refs/tags/")) {
              const tag = ref.replace("refs/tags/", "");
              extensions = catalog.extensions.filter((e) => tag.startsWith(e.tagPrefix));
            }
            const matrix = { extension: extensions };
            fs.appendFileSync(process.env.GITHUB_OUTPUT, "matrix=" + JSON.stringify(matrix) + "\n");
          '
        env:
          GITHUB_REF: ${{ github.ref }}

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
    permissions:
      contents: write
    steps:
      - name: Derive version
        id: check
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/${{ matrix.extension.tagPrefix }}v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/${{ matrix.extension.tagPrefix }}v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      # Unconditional: the validate job's matrix computation already filters to only the tagged
      # extension on a tag push (all entries on a PR), so there is nothing left for this job to
      # re-check per-step.
      - uses: actions/checkout@v7

      - name: Setup .NET
        if: ${{ !matrix.extension.manifestOnly }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        if: ${{ !matrix.extension.manifestOnly }}
        run: dotnet restore ${{ matrix.extension.projectPath }} -p:UseLocalCoveSource=false

      - name: Build
        if: ${{ !matrix.extension.manifestOnly }}
        run: dotnet build ${{ matrix.extension.projectPath }} -c Release --no-restore -p:UseLocalCoveSource=false -p:Version=${{ steps.check.outputs.version }} -p:ContinuousIntegrationBuild=true

      # Unit tier only — this bare runner has no ../cove sibling checkout, so the test project's
      # cove-referencing sources are Compile-Removed (see Renamer.Tests.csproj's cove-absent
      # group). Runs before Publish so a test failure blocks packaging, matching
      # windows-build-test's build-then-test order in lint.yml. Optional: an extension without a
      # testProjectPath entry in catalog.json skips this step (manifestOnly-style opt-out).
      - name: Test (unit tier)
        if: ${{ !matrix.extension.manifestOnly && matrix.extension.testProjectPath != '' }}
        run: dotnet test ${{ matrix.extension.testProjectPath }} -c Release -p:UseLocalCoveSource=false

      - name: Publish
        if: ${{ !matrix.extension.manifestOnly }}
        run: dotnet publish ${{ matrix.extension.projectPath }} -c Release -o artifacts/${{ matrix.extension.name }} --no-build -p:UseLocalCoveSource=false -p:Version=${{ steps.check.outputs.version }} -p:ContinuousIntegrationBuild=true

      # Catalog-driven strip-verify gate: proves the publish set carries no host-provided
      # (denylisted) assembly, carries the entry assembly plus any first-party runtime dependency
      # the catalog entry declares in requiredBundledDlls, and leaks no absolute build path in its
      # json. Runs on every build (not tag-gated), so a leak fails the build before anything is
      # zipped. scripts/strip-verify.mjs is the single shared implementation both this job and the
      # local release-proof harness call, and it reads the shared .github/DLL_DENYLIST.json — so
      # there is no drift between what CI enforces and what a local run proves, nor when the host
      # adds a provided dependency.
      - name: Strip-verify (no host assemblies, no absolute paths)
        if: ${{ !matrix.extension.manifestOnly }}
        run: node scripts/strip-verify.mjs artifacts/${{ matrix.extension.name }} ${{ matrix.extension.id }}

      - name: Copy manifest
        if: ${{ !matrix.extension.manifestOnly }}
        run: cp ${{ matrix.extension.manifestPath }} artifacts/${{ matrix.extension.name }}/

      - name: Stamp packaged extension.json version
        if: ${{ !matrix.extension.manifestOnly }}
        run: |
          node -e "const fs=require('fs'); const p='artifacts/${{ matrix.extension.name }}/extension.json'; const m=JSON.parse(fs.readFileSync(p,'utf8')); m.version='${{ steps.check.outputs.version }}'; fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');"

      # Conditional frontend build — only extensions with a uiPath field ship a frontend bundle.
      - name: Setup Node
        if: ${{ matrix.extension.uiPath != '' }}
        uses: actions/setup-node@v6
        with:
          # Pin matches the UI package.json volta pin for a reproducible build.
          node-version: '24.11.0'

      # `npm install`, not `npm ci`: the root package.json's npm workspaces (added for the shared
      # tests/e2e harness) make npm refuse `npm ci` in this nested, non-workspace UI package
      # (Renamer.Ui is deliberately standalone — offline vendored @cove/extension-sdk tarball, its
      # own lockfile, its own Dependabot entry). `npm install` on an in-sync lockfile is a no-op;
      # UI reproducibility is anchored by the committed lockfile.
      - name: Install frontend deps (offline, vendored SDK)
        if: ${{ matrix.extension.uiPath != '' }}
        working-directory: ${{ matrix.extension.uiPath }}
        run: npm install

      - name: Stamp source package.json version
        if: ${{ matrix.extension.uiPath != '' }}
        working-directory: ${{ matrix.extension.uiPath }}
        run: npm version ${{ steps.check.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Verify frontend (typecheck + lint + format:check + check-classes + test)
        if: ${{ matrix.extension.uiPath != '' }}
        working-directory: ${{ matrix.extension.uiPath }}
        run: npm run verify

      - name: Build frontend bundle
        if: ${{ matrix.extension.uiPath != '' }}
        working-directory: ${{ matrix.extension.uiPath }}
        run: npm run build

      - name: Copy frontend bundle
        if: ${{ matrix.extension.uiPath != '' }}
        run: cp ${{ matrix.extension.uiPath }}/dist/index.mjs artifacts/${{ matrix.extension.name }}/

      # Version parity: the version the manifest, the assembly, the UI package, and (when it exists)
      # the catalog registry manifest declare must agree, so a release can't ship a manifest that
      # disagrees with the binary. The registry manifest (<path>/extensions/<id>.json) is the
      # optional 4th arg and is passed ONLY when that file exists — an extension not yet registered
      # in the store has no such file, and check-version-parity.mjs would otherwise crash on the
      # missing path before packaging.
      # PR-excluded like Package/Upload artifact below: on a PR build steps.check.outputs.version
      # is the "0.0.0" placeholder (no real tag), which the "Stamp source package.json version"
      # step above writes into package.json — but extension.json's own version is left at its real
      # value (only the PACKAGED copy under artifacts/ gets stamped on a real release), so a PR
      # build's package.json and extension.json versions are expected to disagree and would always
      # fail this gate. The real check only makes sense once there's a real version being released.
      - name: Check version parity
        if: ${{ matrix.extension.versionSourcePath != '' && github.event_name != 'pull_request' }}
        shell: bash
        run: |
          registry="${{ matrix.extension.path }}/extensions/${{ matrix.extension.id }}.json"
          args=("${{ matrix.extension.manifestPath }}" "${{ matrix.extension.versionSourcePath }}" "${{ matrix.extension.uiPath }}/package.json")
          if [[ -f "$registry" ]]; then
            args+=("$registry")
          fi
          node scripts/check-version-parity.mjs "${args[@]}"

      - name: Package
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          cd artifacts/${{ matrix.extension.name }}
          zip -r ../../${{ matrix.extension.id }}-${{ steps.check.outputs.version }}.zip .

      - name: Upload artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.extension.id }}-${{ steps.check.outputs.version }}
          path: ${{ matrix.extension.id }}-${{ steps.check.outputs.version }}.zip

  # ---- E2E: rebuilds each extension (a separate job from build/matrix.extension — GitHub Actions
  # jobs don't share a filesystem, so this job publishes its own fresh copy rather than trying to
  # reuse the build job's disk state) and installs the result into a containerized, official Cove
  # instance via tests/e2e's shared harness, then runs its Playwright suite against it.
  # Extensions without their own e2e suite are skipped via the catalog's optional
  # `e2ePath`/`e2eProject` fields (absent = no suite yet, not a failure).
  e2e:
    needs: [validate, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Check for an e2e suite
        id: check
        shell: bash
        run: |
          if [[ -n "${{ matrix.extension.e2ePath }}" && -d "${{ matrix.extension.e2ePath }}" && -n "${{ matrix.extension.e2eProject }}" ]]; then
            echo "has_suite=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_suite=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.extension.name }} has no e2ePath/e2eProject in catalog.json (or the directory is missing) — skipping E2E for this extension."
          fi
          if [[ -n "${{ matrix.extension.e2eNodeTestsPath }}" && -d "${{ matrix.extension.e2eNodeTestsPath }}" ]]; then
            echo "has_node_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: (steps.check.outputs.has_suite == 'true' || steps.check.outputs.has_node_tests == 'true') && !matrix.extension.manifestOnly
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Publishes to <extension.path>/artifacts/publish, NOT the build job's repo-root-relative
      # artifacts/<name> — this must match the path each extension's own e2e fixtures file expects
      # (e.g. Renamer's RENAMER_EXTENSION.publishDir), which mirrors what a local dev deploy script
      # (deploy-dev.ps1) produces. A mismatch here fails every E2E test at harness install time with
      # "publishDir does not exist" — found via this repo's actual first CI run, since this job's
      # own publish path was never exercised against the real fixtures before.
      - name: Build extension (publish output for the harness to install)
        if: (steps.check.outputs.has_suite == 'true' || steps.check.outputs.has_node_tests == 'true') && !matrix.extension.manifestOnly
        run: dotnet publish ${{ matrix.extension.projectPath }} -c Release -o ${{ matrix.extension.path }}/artifacts/publish -p:UseLocalCoveSource=false

      - name: Setup Node
        if: steps.check.outputs.has_suite == 'true' || steps.check.outputs.has_node_tests == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24.11.0'

      # `npm install` (not `npm ci`) for the same reason as the build job's UI step: npm refuses
      # `npm ci` in this nested non-workspace UI package once a root workspace exists. No-op on an
      # in-sync lockfile.
      - name: Build extension UI bundle
        if: (steps.check.outputs.has_suite == 'true' || steps.check.outputs.has_node_tests == 'true') && matrix.extension.uiPath != ''
        working-directory: ${{ matrix.extension.uiPath }}
        run: |
          npm install
          npm run build

      # npm ci runs at the REPO ROOT so the workspace symlinks (node_modules/@cove-extensions/e2e ->
      # tests/e2e) + the single hoisted @playwright/test are established before the suite runs. A
      # `cd tests/e2e && npm ci` would ignore the root lockfile/workspaces and is wrong now.
      - name: Install harness dependencies
        if: steps.check.outputs.has_suite == 'true' || steps.check.outputs.has_node_tests == 'true'
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E suite
        id: e2e
        if: steps.check.outputs.has_suite == 'true'
        working-directory: tests/e2e
        run: npx playwright test --project=${{ matrix.extension.e2eProject }}

      # The container-correctness tier: the extension's non-browser API/webhook/sync specs run against
      # a real Whisparr container whose metadata source is a committed offline replay stub. It reads no
      # repository secret — identities resolve through the stub and the Whisparr images are public — so
      # it runs on fork pull requests, where secrets are never provided. The glob is required: `node
      # --test <dir>` treats a bare directory as a module entry point on current Node and fails, so the
      # run must enumerate the spec files. Files run serially (--test-concurrency=1): each spec boots its
      # own Cove + Whisparr + stub stack, and running them in parallel starves the runner's Docker host.
      - name: Run node:test correctness tier (offline, no secret)
        id: node_tests
        if: steps.check.outputs.has_node_tests == 'true'
        run: node --test --test-concurrency=1 ${{ matrix.extension.e2eNodeTestsPath }}/*.test.mjs

      # The `list` reporter's stdout only ever shows pass/fail + duration, never the actual
      # assertion/stack-trace detail, which otherwise only reaches the Upload Playwright report
      # artifact below — requiring a download+unzip round trip to read. Dump it straight to the job
      # log instead so a CI failure is diagnosable from the log alone (CI-02's own requirement).
      - name: Dump E2E failure context
        if: steps.check.outputs.has_suite == 'true' && failure() && steps.e2e.outcome == 'failure'
        working-directory: tests/e2e
        shell: bash
        run: |
          for f in $(find test-results -name "error-context.md" 2>/dev/null); do
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done

      - name: Upload Playwright report
        if: steps.check.outputs.has_suite == 'true' && failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.extension.id }}-e2e-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          files: '*.zip'
          generate_release_notes: true

  # csharp-format, windows-build-test, and markdown-lint moved to lint.yml — none of them have a
  # `needs:` link into this file's validate/build/e2e/release chain, so they gained nothing from
  # co-location and were missing main-push coverage that lint.yml now has (see lint.yml's header).
